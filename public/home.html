<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>બસ બુકિંગ - AI સહાયક</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@300;400;600;700&family=Noto+Serif+Gujarati:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --saffron: #FF6B00;
      --saffron-light: #FF8C38;
      --saffron-dark: #CC5500;
      --deep-blue: #0A1628;
      --mid-blue: #112240;
      --card-bg: #0D1B33;
      --border: rgba(255,107,0,0.2);
      --text-primary: #F0E6D3;
      --text-muted: #8A9BB5;
      --user-bubble: #FF6B00;
      --ai-bubble: #152644;
      --success: #22C55E;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans Gujarati', sans-serif;
      background: var(--deep-blue);
      color: var(--text-primary);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(255,107,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, rgba(255,107,0,0.05) 0%, transparent 60%),
        linear-gradient(160deg, #0A1628 0%, #0D1B33 50%, #0A1628 100%);
    }

    .bg-road {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 180px;
      z-index: 0;
      opacity: 0.08;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 60px,
        rgba(255,255,255,0.3) 60px,
        rgba(255,255,255,0.3) 100px
      );
      border-top: 3px solid rgba(255,255,255,0.15);
    }

    /* Floating bus animation */
    .floating-bus {
      position: fixed;
      bottom: 20px;
      left: -120px;
      font-size: 3rem;
      z-index: 1;
      animation: driveBus 18s linear infinite;
      filter: drop-shadow(0 0 15px rgba(255,107,0,0.4));
    }

    @keyframes driveBus {
      0%   { left: -120px; }
      100% { left: calc(100vw + 120px); }
    }

    /* Stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(10,22,40,0.8);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 0 20px rgba(255,107,0,0.4);
    }

    .logo-text h1 {
      font-family: 'Noto Serif Gujarati', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
    }

    .logo-text span {
      font-size: 0.7rem;
      color: var(--saffron-light);
      letter-spacing: 0.05em;
    }

    .header-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.75rem;
      color: var(--success);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* Chat area */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-container::-webkit-scrollbar { width: 4px; }
    .chat-container::-webkit-scrollbar-track { background: transparent; }
    .chat-container::-webkit-scrollbar-thumb {
      background: rgba(255,107,0,0.3);
      border-radius: 2px;
    }

    /* Welcome card */
    .welcome-card {
      text-align: center;
      padding: 36px 24px;
      animation: fadeSlideUp 0.6s ease both;
    }

    .welcome-bus-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome-card h2 {
      font-family: 'Noto Serif Gujarati', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 10px;
    }

    .welcome-card p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    /* Quick action chips */
    .quick-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }

    .chip {
      background: rgba(255,107,0,0.08);
      border: 1px solid rgba(255,107,0,0.3);
      color: var(--saffron-light);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-family: 'Noto Sans Gujarati', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .chip:hover {
      background: rgba(255,107,0,0.2);
      border-color: var(--saffron);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,107,0,0.2);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      max-width: 82%;
      animation: fadeSlideUp 0.3s ease both;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.ai {
      align-self: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .avatar.ai-avatar {
      background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
      box-shadow: 0 0 12px rgba(255,107,0,0.3);
    }

    .avatar.user-avatar {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .bubble {
      padding: 13px 17px;
      border-radius: 18px;
      font-size: 0.88rem;
      line-height: 1.75;
      position: relative;
    }

    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text-primary);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
      border-top-right-radius: 4px;
      color: white;
      box-shadow: 0 4px 15px rgba(255,107,0,0.25);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 10px;
      align-self: flex-start;
      animation: fadeSlideUp 0.3s ease both;
    }

    .typing-dots {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-top-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--saffron);
      border-radius: 50%;
      animation: dotBounce 1.2s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%       { transform: translateY(-5px); opacity: 1; }
    }

    /* Booking card inside chat */
    .booking-summary-card {
      background: rgba(255,107,0,0.06);
      border: 1px solid rgba(255,107,0,0.25);
      border-radius: 14px;
      padding: 16px;
      margin-top: 10px;
      font-size: 0.82rem;
    }

    .booking-summary-card .row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,107,0,0.1);
    }

    .booking-summary-card .row:last-child { border-bottom: none; }
    .booking-summary-card .label { color: var(--text-muted); }
    .booking-summary-card .value { color: var(--saffron-light); font-weight: 600; }

    /* Input area */
    .input-area {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: rgba(10,22,40,0.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: var(--saffron);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.1);
    }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-family: 'Noto Sans Gujarati', sans-serif;
      font-size: 0.88rem;
      line-height: 1.5;
      resize: none;
      max-height: 100px;
      overflow-y: auto;
    }

    #userInput::placeholder { color: var(--text-muted); }

    #userInput::-webkit-scrollbar { width: 3px; }
    #userInput::-webkit-scrollbar-thumb { background: rgba(255,107,0,0.2); }

    .send-btn {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(255,107,0,0.3);
    }

    .send-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(255,107,0,0.4);
    }

    .send-btn:active { transform: scale(0.95); }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* Start button */
    .start-btn {
      display: block;
      margin: 0 auto 16px;
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--saffron), var(--saffron-dark));
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'Noto Sans Gujarati', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(255,107,0,0.35);
      letter-spacing: 0.02em;
    }

    .start-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,0,0.45);
    }

    .start-btn:active { transform: translateY(0); }

    .hint-text {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* Route pill in messages */
    .route-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,107,0,0.15);
      border: 1px solid rgba(255,107,0,0.3);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: var(--saffron-light);
      margin: 4px 2px;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .message { max-width: 92%; }
      header { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<!-- Background -->
<div class="bg-pattern"></div>
<div class="bg-road"></div>
<div class="stars" id="stars"></div>
<div class="floating-bus">🚌</div>

<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🚍</div>
      <div class="logo-text">
        <h1>ગુજરાત બસ</h1>
        <span>AI સહાયક • BUS BOOKING</span>
      </div>
    </div>
    <div class="header-badge">
      <div class="status-dot"></div>
      ઓનલાઇન
    </div>
  </header>

  <!-- Chat -->
  <div class="chat-container" id="chatContainer">
    <div class="welcome-card">
      <span class="welcome-bus-icon">🚌</span>
      <h2>નમસ્તે! 🙏</h2>
      <p>હું તમારો AI બસ બુકિંગ સહાયક છું.<br/>
         હું ફક્ત ગુજરાતીમાં વાત કરું છું.<br/>
         ચાલો, તમારી બસ બુક કરીએ!</p>
      <div class="quick-chips">
        <div class="chip" onclick="sendChip('અમદાવાદથી સુરત')">🗺️ અમદાવાદ → સુરત</div>
        <div class="chip" onclick="sendChip('અમદાવાદથી મુંબઈ')">🗺️ અમદાવાદ → મુંબઈ</div>
        <div class="chip" onclick="sendChip('સુરતથી રાજકોટ')">🗺️ સુરત → રાજકોટ</div>
        <div class="chip" onclick="sendChip('ટિકિટ ભાવ જાણો')">💰 ભાવ પૂછો</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <button class="start-btn" id="startBtn" onclick="startBooking()">
      🚀 બુકિંગ શરૂ કરો
    </button>
    <div class="input-wrapper">
      <textarea
        id="userInput"
        rows="1"
        placeholder="ગુજરાતીમાં ટાઇપ કરો... (દા.ત. અમદાવાદથી સુરત)"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <p class="hint-text">Enter દબાવો અથવા → બટન દબાવો</p>
  </div>
</div>

<script>
  // ── Stars ──────────────────────────────────────────────
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*70}%;
      --d:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s
    `;
    starsEl.appendChild(s);
  }

  // ── State ──────────────────────────────────────────────
  const conversationHistory = [];
  let bookingStarted = false;

  const SYSTEM_PROMPT = `તમે એક AI બસ બુકિંગ સહાયક છો. તમે ફક્ત ગુજરાતી ભાષામાં જ વાત કરો છો — ક્યારેય અંગ્રેજી વાપરશો નહીં.

તમારું કામ:
1. વપરાશકર્તા પાસેથી પ્રવાસ વિગતો મેળવો: ક્યાંથી → ક્યાં, તારીખ, સીટ સંખ્યા
2. ઉપલબ્ધ બસ વિકલ્પો સૂચવો (ઉદા: AC સ્લીપર ₹450, સામાન્ય ₹280)
3. પ્રવાસી નામ અને ફોન નંબર લો
4. બુકિંગ કન્ફર્મ કરો અને PNR નંબર આપો

નિયમો:
- ફક્ત ગુજરાતીમાં જ જવાબ આપો
- ટૂંકા, સ્પષ્ટ સવાલો પૂછો
- મૈત્રીભર્યો, સ્નેહાળ સ્વભાવ રાખો
- ઇમોજી વાપરો 🚌 🎉 ✅
- PNR ફોર્મેટ: GJ + 6 digit number (ઉદા: GJ123456)`;

  // ── UI helpers ─────────────────────────────────────────
  function appendMessage(role, text) {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'ai' ? 'ai-avatar' : 'user-avatar'}`;
    avatar.textContent = role === 'ai' ? '🤖' : '👤';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = formatText(text);

    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  function formatText(text) {
    return text
      .replace(/\n/g, '<br/>')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  }

  function showTyping() {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typingIndicator';
    div.innerHTML = `
      <div class="avatar ai-avatar">🤖</div>
      <div class="typing-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── Start booking ──────────────────────────────────────
  function startBooking() {
    const btn = document.getElementById('startBtn');
    btn.style.display = 'none';
    bookingStarted = true;
    callAI('નમસ્તે! હું બસ બુક કરવા ઇચ્છું છું.');
  }

  function sendChip(text) {
    if (!bookingStarted) {
      document.getElementById('startBtn').style.display = 'none';
      bookingStarted = true;
    }
    callAI(text);
  }

  // ── Send message ───────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    if (!bookingStarted) {
      document.getElementById('startBtn').style.display = 'none';
      bookingStarted = true;
    }

    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', text);
    await callAI(text);
  }

  // ── Anthropic API call ─────────────────────────────────
  async function callAI(userText) {
    conversationHistory.push({ role: 'user', content: userText });
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: conversationHistory
        })
      });

      const data = await response.json();
      removeTyping();

      const replyText = data.content
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('\n');

      conversationHistory.push({ role: 'assistant', content: replyText });
      appendMessage('ai', replyText);

    } catch (err) {
      removeTyping();
      appendMessage('ai', '⚠️ માફ કરશો, કનેક્શનમાં સમસ્યા છે. કૃપા કરીને ફરી પ્રયાસ કરો.');
      console.error(err);
    }
  }
</script>
